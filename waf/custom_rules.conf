SecRule ARGS "@rx (?i:(union\s+select|select\s+.*from|or\s+1=1|--|#))" \
"id:99999999999,phase:2,deny,status:403,msg:'SQL Injection Attempt Detected'"

SecRule ARGS|REQUEST_HEADERS|REQUEST_COOKIES "@rx (?i:\b(union(\s+all)?\s+select|select\s+.+\s+from|insert\s+into|update\s+\w+\s+set|delete\s+from|drop\s+table|or\s+[\w\d]+\s*=\s*[\w\d]+|and\s+[\w\d]+\s*=\s*[\w\d]+|--|#|/\*.*?\*/)\b)" \"id:1000001,phase:2,deny,log,status:403,severity:CRITICAL,msg:'Advanced SQL Injection Attempt Detected',t:urlDecodeUni,t:lowercase,t:compressWhitespace"
